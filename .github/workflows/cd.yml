name: CD

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push Docker image
        run: |
          docker build -t kinglast/iris-model:v${{ github.run_number }} .
          docker push kinglast/iris-model:v${{ github.run_number }}
      - name: Update Kubernetes manifest
        run: sed -i 's|kinglast/iris-model:v[0-9]*|kinglast/iris-model:v${{ github.run_number }}|g' k8s/inference.yaml
      - name: Commit and push changes
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add k8s/inference.yaml
          git commit -m "Update image to v${{ github.run_number }} [skip ci]"
          git pull --rebase origin main
          git push