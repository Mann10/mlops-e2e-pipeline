name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest flake8
      - name: Lint with flake8
        run: flake8 app/main.py model/train.py --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run model training and tests
        run: |
          cd model
          python train.py
          cd ..
          cp model/model.pkl model.pkl
          python -m pytest tests/ -v
      - name: Build Docker image
        run: docker build -t iris-model:test .
      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 8080:8080 iris-model:test
          sleep 10
          curl -f http://localhost:8080/
          curl -f http://localhost:8080/ready
          curl -X POST http://localhost:8080/predict -H "Content-Type: application/json" -d '{"data": [5.1, 3.5, 1.4, 0.2]}'
          docker stop test-container